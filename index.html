<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed Yousif | VIP Card</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
transition:0.3s;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
background-size:400% 400%;
animation:gradient 12s ease infinite;
color:white;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
padding:40px;
border-radius:30px;
width:370px;
text-align:center;
box-shadow:0 30px 60px rgba(0,0,0,0.7);
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.profile img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #00ffff;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
margin:15px 0 5px;
}

.bio{
opacity:0.8;
margin-bottom:20px;
font-size:14px;
}

.links a{
display:block;
margin:12px 0;
padding:14px;
border-radius:20px;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.15);
box-shadow:0 0 10px #00ffff;
}

.links a:hover{
background:#00ffff;
color:black;
transform:scale(1.08);
box-shadow:0 0 25px #00ffff;
}

.qr img{
width:170px;
margin-top:20px;
border-radius:20px;
}

.toggle{
margin-top:15px;
cursor:pointer;
padding:8px 15px;
border-radius:20px;
background:#00ffff;
color:black;
font-weight:bold;
display:inline-block;
}
.light{
background:white;
color:black;
}
.light .card{
background:rgba(0,0,0,0.05);
color:black;
}
</style>
</head>

<body>

<div class="card">

<div class="profile">
<img src="https://drive.google.com/uc?export=view&id=1mh5N0icf6Pewy_IXAb8tc3m_s62xdcQ3">
<h1>Mohamed Yousif</h1>
<div class="bio">IT | Programming | Tech Lover |C++</div>
</div>

<div class="links">
<a href="https://wa.me/917901743095">📱 WhatsApp</a>
<a href="https://www.instagram.com/_mohamd_o/">📸 Instagram</a>
<a href="https://www.facebook.com/10TinGa/">📘 Facebook</a>
<a href="https://www.linkedin.com/in/mohamed-yousif-838724388/">💼 LinkedIn</a>
<a href="https://github.com/mohamed-yousif-web">💻 GitHub</a>
</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://wa.me/917901743095">
</div>

<div class="toggle" onclick="toggleMode()">Toggle Mode</div>

</div>

<script>
function toggleMode(){
document.body.classList.toggle("light");
}
</script>

</body>
</html>
